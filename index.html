.yt-input-row input{flex:1;background:#13131a;border:1px solid #2d2d3d;border-radius:6px;color:#e2e8f0;padding:6px 8px;font-size:0.78rem;outline:none}
.yt-input-row input:focus{border-color:#a78bfa}
.yt-input-row button{background:#1e1e2e;border:1px solid #2d2d3d;color:#a78bfa;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:0.75rem;white-space:nowrap}
.yt-input-row button:hover{background:#2d2d3d}
.yt-thumb{display:block;position:relative;border-radius:8px;overflow:hidden;margin-top:6px;cursor:pointer;text-decoration:none}
.yt-thumb img{width:100%;border-radius:8px;display:block}
.yt-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);border-radius:8px}
.yt-play-btn{width:52px;height:52px;background:rgba(255,0,0,0.9);border-radius:50%;display:flex;align-items:center;justify-content:center}
.yt-play-arrow{width:0;height:0;border-top:10px solid transparent;border-bottom:10px solid transparent;border-left:18px solid white;margin-left:4px}
.yt-remove{font-size:0.7rem;color:#f87171;cursor:pointer;margin-top:4px;display:inline-block}
.yt-remove:hover{text-decoration:underline}
.add-trade-btn{width:100%;background:#1e1e2e;border:1.5px dashed #2d2d3d;color:#64748b;border-radius:7px;padding:9px;cursor:pointer;font-size:0.8rem;transition:all 0.15s;margin-bottom:10px}
.add-trade-btn:hover{border-color:#a78bfa;color:#a78bfa}
.save-btn{flex:2;background:#a78bfa;color:#0d0d12;border:none;border-radius:8px;padding:10px;font-weight:700;font-size:0.88rem;cursor:pointer}
.save-btn:hover{background:#c4b5fd}
.cancel-btn{flex:1;background:#1e1e2e;border:1px solid #2d2d3d;color:#94a3b8;border-radius:8px;padding:10px;cursor:pointer;font-size:0.82rem}
.edit-btn{background:#1e1e2e;border:1px solid #a78bfa;color:#a78bfa;border-radius:7px;padding:7px 16px;cursor:pointer;font-size:0.8rem;font-weight:600}
.edit-btn:hover{background:#3b1f6e}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:500;display:none;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px}
.lb-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:2rem;cursor:pointer}
.green{color:#4ade80}.red{color:#f87171}.purple{color:#a78bfa}.muted{color:#64748b}.neutral{color:#94a3b8}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#0d0d12}
::-webkit-scrollbar-thumb{background:#2d2d3d;border-radius:3px}
</style>
</head>
<body>
<div id="app-loading">Loading...</div>
<div id="login-overlay" style="display:none">
  <div id="login-box">
    <h2>📊 Trading Journal</h2>
    <div class="login-sub">Sign in to access your trades</div>
    <input type="email" id="login-email" placeholder="Email" autocomplete="email">
    <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
    <button id="login-btn" onclick="doLogin()">Sign In</button>
    <div id="login-error"></div>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="resize-handle" id="resize-handle"></div>
  <div class="sidebar-inner">
    <div class="sidebar-logo">📈 Journal</div>
    <div class="sidebar-section">Views</div>
    <div class="sidebar-item active" id="nav-calendar" onclick="showPage('calendar',this)">
      <span style="font-size:13px;flex-shrink:0">📅</span> Calendar
    </div>
    <div class="sidebar-item" id="nav-quarterly" onclick="showPage('quarterly',this)">
      <span style="font-size:13px;flex-shrink:0">📊</span> Performance
    </div>
    <hr class="sidebar-divider">
    <div class="sidebar-section">Data</div>
    <button class="export-btn" onclick="exportData()"><span style="font-size:12px;flex-shrink:0">⬇️</span> Export Data</button>
    <label class="import-label"><input type="file" accept=".json" onchange="importData(event)"><span style="font-size:12px;flex-shrink:0">⬆️</span> Import Data</label>
    <button class="clear-btn" onclick="clearData()"><span style="font-size:12px;flex-shrink:0">🗑️</span> Clear All Data</button>
    <hr class="sidebar-divider">
    <div class="sidebar-section">Quick Links</div>
    <div id="quick-links-list"></div>
    <div class="quick-link-add" onclick="toggleAddLink()"><span style="font-size:12px;flex-shrink:0">+</span> Add link</div>
    <div id="add-link-row" style="display:none">
      <div class="ql-input-row">
        <input id="ql-name" placeholder="Label" style="width:55px;flex-shrink:0">
        <input id="ql-url" placeholder="https://...">
        <button class="ql-add-btn" onclick="saveQuickLink()">Add</button>
      </div>
    </div>
  </div>
</div>

<div class="main">
  <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">&#8249;</button>

  <div class="topbar">
    <div class="topbar-title" id="topbar-title">Calendar</div>
    <div class="header-stats">
      <div class="hstat"><div class="hstat-val purple" id="hs-trades">0</div><div class="hstat-lbl">Trades</div></div>
      <div class="hstat"><div class="hstat-val neutral" id="hs-wr">—</div><div class="hstat-lbl">Win Rate</div></div>
      <div class="hstat"><div class="hstat-val muted" id="hs-pnl">$0</div><div class="hstat-lbl">All-time P&L</div></div>
    </div>
  </div>

  <div class="page active" id="page-calendar">
    <div class="cal-header">
      <div class="cal-nav-center">
        <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
        <div class="cal-month" id="cal-month-label"></div>
        <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
      </div>
      <button class="today-btn" onclick="goToday()">Today</button>
    </div>
    <div class="cal-body">
      <div class="cal-dow">
        <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <div class="page" id="page-quarterly">
    <div class="q-year-nav">
      <button class="q-year-btn" onclick="changeYear(-1)">&#8249;</button>
      <div class="q-year-label" id="q-year-label">2026</div>
      <button class="q-year-btn" onclick="changeYear(1)">&#8250;</button>
    </div>
    <div class="q-top">
      <div class="q-overview-grid" id="q-overview-grid"></div>
    </div>
    <div class="q-bottom">
      <div class="chart-section">
        <div class="chart-title">Running P&L — All Trades</div>
        <div class="chart-wrap"><canvas id="pnl-chart"></canvas></div>
      </div>
    </div>
  </div>

  <div class="page" id="page-qdetail">
    <div class="qd-header">
      <div style="display:flex;align-items:center;gap:6px;color:#a78bfa;cursor:pointer;font-size:0.82rem" onclick="showPage('quarterly',document.getElementById('nav-quarterly'))">&#8592; Back</div>
      <div class="qd-title" id="qd-title"></div>
      <div class="qd-pnl" id="qd-pnl"></div>
    </div>
    <div class="qd-stats-bar" id="qd-stats-bar"></div>
    <div class="qd-chart">
      <div style="font-size:0.7rem;color:#64748b;margin-bottom:6px">Running P&L this quarter</div>
      <div class="qd-chart-wrap"><canvas id="qd-chart"></canvas></div>
    </div>
    <div class="filter-bar" id="filter-bar"></div>
    <div class="qd-trades" id="qd-trades"></div>
  </div>

  <div class="overlay-wrap" id="overlay" onclick="closeOverlay(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-date-title"></div>
        <button class="close-btn" onclick="closeModalDirect()">&#215;</button>
      </div>
      <div class="day-summary" id="day-summary"></div>
      <div id="logged-trades"></div>
      <button class="add-trade-btn" id="add-trade-btn" onclick="showTradeForm(null)">+ Add Trade</button>
      <div id="trade-form-wrap" style="display:none"></div>
    </div>
  </div>

  <div class="overlay-wrap" id="detail-overlay" onclick="closeDetailOverlay(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="detail-title">Trade Detail</div>
        <button class="close-btn" onclick="closeDetailDirect()">&#215;</button>
      </div>
      <div id="detail-content"></div>
      <div style="margin-top:14px">
        <button class="edit-btn" id="detail-edit-btn">✏️ Edit Trade</button>
      </div>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">&#215;</button>
  <img id="lb-img" src="" alt="">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
let data=JSON.parse(localStorage.getItem('tj2_data')||'{}');
let quickLinks=JSON.parse(localStorage.getItem('tj2_links')||'[]');
let customPairs=JSON.parse(localStorage.getItem('tj2_pairs')||'[]');
if(!customPairs.length){customPairs=['XAUUSD','EURUSD','GBPUSD','USDJPY','USDCAD','AUDUSD','NZDUSD','US30','NAS100','SPX500'];}
if(!quickLinks.length){quickLinks=[{name:'TradingView',url:'https://tradingview.com'},{name:'Hyperliquid',url:'https://app.hyperliquid.xyz/portfolio'},{name:'Discord',url:'https://discord.com'}];}

let currentYear,currentMonth,activeDate,pendingShots=[],activeTags=new Set();
let editingIdx=null,editingDk=null,pnlChart=null,qdChart=null;
let currentQTrades=[],activeSetupFilter='All',pendingYT='';
let qYear=new Date().getFullYear();
let sidebarHidden=false;

const SETUPS=['Break & Retest','Candle Breakout','Bounce','N/A'];
const TAGS=[
  'Bullish Structure','Bearish Structure',
  'Breakout: Closure Above/Below POI Zone',
  'Retest: After Price Pullback & Rejection POI',
  'Support Formed','Resistance Formed',
  'Candle Variation Pattern','Rejection Candles',
  'BOL or BOH Setup with Candle Confirmations',
  'Clean Range','Market Session S/R',
  'Fakeout','Wickfill','Exhaustion Candles','Invalid'
];

function autoResult(pnl){return pnl>0?'Win':pnl<0?'Loss':'Breakeven';}
function pnlStr(val){const v=parseFloat(val)||0;return v>=0?`+$${v.toFixed(2)}`:`-$${Math.abs(v).toFixed(2)}`;}
function pnlClass(val){return parseFloat(val)>=0?'green':'red';}
function saveData(){localStorage.setItem('tj2_data',JSON.stringify(data));}
function saveLinks(){localStorage.setItem('tj2_links',JSON.stringify(quickLinks));}
function savePairs(){localStorage.setItem('tj2_pairs',JSON.stringify(customPairs));}

function getYTId(url){
  if(!url||!url.trim())return null;
  try{
    let m=url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);if(m)return m[1];
    m=url.match(/[?&]v=([a-zA-Z0-9_-]{11})/);if(m)return m[1];
    m=url.match(/\/embed\/([a-zA-Z0-9_-]{11})/);if(m)return m[1];
    m=url.match(/\/shorts\/([a-zA-Z0-9_-]{11})/);if(m)return m[1];
    m=url.match(/\/live\/([a-zA-Z0-9_-]{11})/);if(m)return m[1];
    m=url.match(/\/([a-zA-Z0-9_-]{11})(?:[?&]|$)/);if(m)return m[1];
  }catch(e){}
  return null;
}

function ytThumb(ytId,url){
  return`<a href="${url||'https://www.youtube.com/watch?v='+ytId}" target="_blank" class="yt-thumb">
    <img src="https://img.youtube.com/vi/${ytId}/hqdefault.jpg" alt="Video thumbnail">
    <div class="yt-play"><div class="yt-play-btn"><div class="yt-play-arrow"></div></div></div>
  </a>`;
}

function initSidebar(){
  const sidebar=document.getElementById('sidebar');
  const handle=document.getElementById('resize-handle');
  let dragging=false,startX=0,startW=0;
  handle.addEventListener('mousedown',e=>{
    e.preventDefault();
    dragging=true;startX=e.clientX;startW=sidebar.offsetWidth;
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const newW=Math.max(0,Math.min(320,startW+(e.clientX-startX)));
    if(newW<20){
      sidebarHidden=true;
      sidebar.style.width='0px';
      sidebar.classList.add('hidden');
    } else {
      sidebarHidden=false;
      sidebar.style.width=newW+'px';
      sidebar.classList.remove('hidden');
    }
    updateToggleBtn();
  });
  document.addEventListener('mouseup',()=>{
    if(dragging){dragging=false;document.body.style.cursor='';document.body.style.userSelect='';}
  });
}

function updateToggleBtn(){
  document.getElementById('sidebar-toggle').innerHTML=sidebarHidden?'&#8250;':'&#8249;';
}

function toggleSidebar(){
  const sidebar=document.getElementById('sidebar');
  sidebarHidden=!sidebarHidden;
  if(sidebarHidden){
    sidebar.style.width='0px';
    sidebar.classList.add('hidden');
  } else {
    sidebar.style.width='200px';
    sidebar.classList.remove('hidden');
  }
  updateToggleBtn();
}

function init(){
  const now=new Date();
  currentYear=now.getFullYear();currentMonth=now.getMonth();
  qYear=now.getFullYear();
  initSidebar();
  renderCalendar();renderQuarterlyOverview();renderQuickLinks();updateStats();
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModalDirect();closeDetailDirect();closeLightbox();}});
}

function showPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(el)el.classList.add('active');
  const titles={calendar:'Calendar',quarterly:'Performance',qdetail:''};
  if(titles[id]!==undefined)document.getElementById('topbar-title').textContent=titles[id];
  if(id==='quarterly'){renderQuarterlyOverview();setTimeout(renderPnlChart,50);}
}

function changeYear(dir){
  qYear+=dir;
  document.getElementById('q-year-label').textContent=qYear;
  renderQuarterlyOverview();
  setTimeout(renderPnlChart,50);
}

function exportData(){
  const blob=new Blob([JSON.stringify({data,quickLinks,customPairs},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`trading-journal-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(url);
}

function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const parsed=JSON.parse(ev.target.result);
      if(parsed.data){
        if(!confirm('This will replace your current data. Continue?'))return;
        data=parsed.data;
        if(parsed.quickLinks)quickLinks=parsed.quickLinks;
        if(parsed.customPairs)customPairs=parsed.customPairs;
        saveData();saveLinks();savePairs();
        renderCalendar();renderQuarterlyOverview();renderQuickLinks();updateStats();
        alert('Imported successfully!');
      } else alert('Invalid backup file.');
    }catch(err){alert('Could not read file.');}
  };
  reader.readAsText(file);e.target.value='';
}

function clearData(){
  if(!confirm('Delete ALL trade data?\n\nMake sure you exported a backup first.'))return;
  if(!confirm('Last warning — this permanently deletes everything. Continue?'))return;
  data={};localStorage.removeItem('tj2_data');
  renderCalendar();renderQuarterlyOverview();updateStats();
  if(pnlChart){pnlChart.destroy();pnlChart=null;}
  if(qdChart){qdChart.destroy();qdChart=null;}
  alert('All data cleared.');
}

function renderQuickLinks(){
  document.getElementById('quick-links-list').innerHTML=quickLinks.map((l,i)=>`
    <div class="ql-item" id="ql-item-${i}">
      <a href="${l.url}" target="_blank" title="${l.url}">${l.name}</a>
      <button class="ql-icon-btn" onclick="startEditLink(${i})" title="Edit" style="color:#a78bfa">✏️</button>
      <button class="ql-icon-btn" onclick="removeLink(${i})" title="Remove" style="color:#f87171">×</button>
    </div>`).join('');
}
function startEditLink(i){
  const l=quickLinks[i];
  const item=document.getElementById(`ql-item-${i}`);if(!item)return;
  item.outerHTML=`<div class="ql-edit-form" id="ql-edit-${i}">
    <input id="ql-edit-name-${i}" value="${l.name}" placeholder="Label">
    <input id="ql-edit-url-${i}" value="${l.url}" placeholder="https://...">
    <div class="ql-edit-actions">
      <button class="ql-cancel-btn" onclick="renderQuickLinks()">Cancel</button>
      <button class="ql-save-btn" onclick="saveEditLink(${i})">Save</button>
    </div>
  </div>`;
}
function saveEditLink(i){
  const name=document.getElementById(`ql-edit-name-${i}`).value.trim();
  let url=document.getElementById(`ql-edit-url-${i}`).value.trim();
  if(!name||!url)return;
  if(!url.startsWith('http'))url='https://'+url;
  quickLinks[i]={name,url};saveLinks();renderQuickLinks();
}
function toggleAddLink(){const r=document.getElementById('add-link-row');r.style.display=r.style.display==='none'?'block':'none';}
function saveQuickLink(){
  const name=document.getElementById('ql-name').value.trim();
  let url=document.getElementById('ql-url').value.trim();
  if(!name||!url)return;
  if(!url.startsWith('http'))url='https://'+url;
  quickLinks.push({name,url});saveLinks();renderQuickLinks();
  document.getElementById('ql-name').value='';document.getElementById('ql-url').value='';
  document.getElementById('add-link-row').style.display='none';
}
function removeLink(i){
  if(!confirm('Remove this link?'))return;
  quickLinks.splice(i,1);saveLinks();renderQuickLinks();
}

function changeMonth(dir){
  currentMonth+=dir;
  if(currentMonth>11){currentMonth=0;currentYear++;}
  if(currentMonth<0){currentMonth=11;currentYear--;}
  renderCalendar();
}
function goToday(){const n=new Date();currentYear=n.getFullYear();currentMonth=n.getMonth();renderCalendar();}

function renderCalendar(){
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-label').textContent=months[currentMonth]+' '+currentYear;
  const grid=document.getElementById('cal-grid');grid.innerHTML='';
  const firstDay=new Date(currentYear,currentMonth,1).getDay();
  const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
  const today=new Date();
  const totalCells=Math.ceil((firstDay+daysInMonth)/7)*7;
  for(let i=0;i<totalCells;i++){
    const d=i-firstDay+1;
    const el=document.createElement('div');
    if(d<1||d>daysInMonth){el.className='cal-day empty';grid.appendChild(el);continue;}
    const dk=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const trades=(data[dk]||{}).trades||[];
    el.className='cal-day';
    if(today.getFullYear()===currentYear&&today.getMonth()===currentMonth&&today.getDate()===d)el.classList.add('today');
    if(trades.length){
      const pnl=trades.reduce((s,t)=>s+(parseFloat(t.pnl)||0),0);
      const wins=trades.filter(t=>t.result==='Win').length;
      const losses=trades.filter(t=>t.result==='Loss').length;
      const bes=trades.filter(t=>t.result==='Breakeven').length;
      if(wins>0&&losses===0&&bes===0)el.classList.add('has-win');
      else if(losses>0&&wins===0&&bes===0)el.classList.add('has-loss');
      else if(bes>0&&wins===0&&losses===0)el.classList.add('has-be');
      else el.classList.add('has-mixed');
      el.innerHTML=`<div class="day-num">${d}</div><div class="day-pnl ${pnlClass(pnl)}">${pnlStr(pnl)}</div><div class="day-count">${trades.length}t</div>`;
    } else {
      el.innerHTML=`<div class="day-num">${d}</div>`;
    }
    el.onclick=()=>openModal(dk);grid.appendChild(el);
  }
}

function buildChartData(trades){
  const sorted=[...trades].sort((a,b)=>a.date.localeCompare(b.date));
  let running=0;const labels=[],values=[];
  sorted.forEach(t=>{running+=parseFloat(t.pnl)||0;labels.push(t.date);values.push(parseFloat(running.toFixed(2)));});
  return{labels,values};
}

function makeChart(canvas,labels,values){
  const isPos=!values.length||values[values.length-1]>=0;
  const lineColor=isPos?'#4ade80':'#f87171';
  return new Chart(canvas,{
    type:'line',
    data:{labels,datasets:[{
      data:values,borderColor:lineColor,borderWidth:2,
      pointBackgroundColor:values.map(v=>v>=0?'#4ade80':'#f87171'),
      pointRadius:3,pointHoverRadius:5,fill:true,
      backgroundColor:(ctx)=>{
        const{ctx:c,chartArea}=ctx.chart;
        if(!chartArea)return'transparent';
        const g=c.createLinearGradient(0,chartArea.top,0,chartArea.bottom);
        g.addColorStop(0,isPos?'rgba(74,222,128,0.25)':'rgba(248,113,113,0.25)');
        g.addColorStop(1,'rgba(0,0,0,0)');return g;
      },tension:0.3
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1e1e2e',borderColor:'#a78bfa',borderWidth:1,titleColor:'#a78bfa',bodyColor:'#e2e8f0',padding:9,
        callbacks:{title:i=>i[0].label,label:i=>`  P&L: ${pnlStr(i.raw)}`}}},
      scales:{
        x:{ticks:{color:'#475569',font:{size:9},maxTicksLimit:7,maxRotation:0},grid:{color:'#1e1e2e'}},
        y:{ticks:{color:'#475569',font:{size:9},callback:v=>`$${v.toFixed(0)}`},grid:{color:'#1e1e2e'}}
      }
    }
  });
}

function renderPnlChart(){
  const canvas=document.getElementById('pnl-chart');if(!canvas)return;
  const all=[];
  Object.entries(data).forEach(([dk,dd])=>(dd.trades||[]).forEach(t=>all.push({...t,date:dk})));
  if(!all.length){if(pnlChart){pnlChart.destroy();pnlChart=null;}return;}
  const{labels,values}=buildChartData(all);
  if(pnlChart)pnlChart.destroy();
  pnlChart=makeChart(canvas,labels,values);
}

function renderQuarterlyOverview(){
  document.getElementById('q-year-label').textContent=qYear;
  const quarters=[{label:'Q1',months:[0,1,2]},{label:'Q2',months:[3,4,5]},{label:'Q3',months:[6,7,8]},{label:'Q4',months:[9,10,11]}];
  const grid=document.getElementById('q-overview-grid');grid.innerHTML='';
  quarters.forEach(q=>{
    const trades=[];
    Object.entries(data).forEach(([dk,dd])=>{
      const d=new Date(dk+'T12:00:00');
      if(d.getFullYear()===qYear&&q.months.includes(d.getMonth()))(dd.trades||[]).forEach(t=>trades.push({...t,date:dk}));
    });
    const pnl=trades.reduce((s,t)=>s+(parseFloat(t.pnl)||0),0);
    const wins=trades.filter(t=>t.result==='Win').length;
    const wr=trades.length?Math.round(wins/trades.length*100):null;
    const card=document.createElement('div');
    card.className='q-overview-card';
    card.innerHTML=`
      <div class="qoc-header">
        <div class="qoc-title">${q.label} ${qYear}</div>
        <div class="qoc-pnl ${pnlClass(pnl)}">${pnlStr(pnl)}</div>
      </div>
      <div class="qoc-stats">
        <div class="qoc-stat"><div class="qoc-val purple">${trades.length}</div><div class="qoc-lbl">Trades</div></div>
        <div class="qoc-stat"><div class="qoc-val neutral">${wr!==null?wr+'%':'—'}</div><div class="qoc-lbl">Win Rate</div></div>
        <div class="qoc-stat"><div class="qoc-val green">${wins}</div><div class="qoc-lbl">Wins</div></div>
      </div>`;
    card.onclick=()=>openQuarterDetail(q,qYear,trades);
    grid.appendChild(card);
  });
}

function openQuarterDetail(q,year,trades){
  currentQTrades=trades;activeSetupFilter='All';
  const pnl=trades.reduce((s,t)=>s+(parseFloat(t.pnl)||0),0);
  const wins=trades.filter(t=>t.result==='Win').length;
  const losses=trades.filter(t=>t.result==='Loss').length;
  const wr=trades.length?Math.round(wins/trades.length*100):null;
  const avg=trades.length?pnl/trades.length:0;
  document.getElementById('qd-title').textContent=`${q.label} ${year}`;
  document.getElementById('qd-pnl').textContent=pnlStr(pnl);
  document.getElementById('qd-pnl').className=`qd-pnl ${pnlClass(pnl)}`;
  document.getElementById('topbar-title').textContent=`${q.label} ${year}`;
  document.getElementById('qd-stats-bar').innerHTML=`
    <div class="qd-stat"><div class="qd-stat-val purple">${trades.length}</div><div class="qd-stat-lbl">Trades</div></div>
    <div class="qd-stat"><div class="qd-stat-val neutral">${wr!==null?wr+'%':'—'}</div><div class="qd-stat-lbl">Win Rate</div></div>
    <div class="qd-stat"><div class="qd-stat-val ${pnlClass(avg)}">${pnlStr(avg)}</div><div class="qd-stat-lbl">Avg P&L</div></div>
    <div class="qd-stat"><div class="qd-stat-val green">${wins}</div><div class="qd-stat-lbl">Wins</div></div>
    <div class="qd-stat"><div class="qd-stat-val red">${losses}</div><div class="qd-stat-lbl">Losses</div></div>
    <div class="qd-stat"><div class="qd-stat-val muted">${trades.filter(t=>t.result==='Breakeven').length}</div><div class="qd-stat-lbl">B/E</div></div>`;
  const qCanvas=document.getElementById('qd-chart');
  if(qdChart){qdChart.destroy();qdChart=null;}
  if(trades.length){const{labels,values}=buildChartData(trades);qdChart=makeChart(qCanvas,labels,values);}
  renderFilterBar();renderQdTrades();
  document.getElementById('qd-trades').scrollTop=0;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-qdetail').classList.add('active');
  document.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('active'));
}

function renderFilterBar(){
  const usedSetups=['All',...new Set(currentQTrades.map(t=>t.setup).filter(Boolean))];
  document.getElementById('filter-bar').innerHTML=`<span class="filter-lbl">Setup:</span>
    ${usedSetups.map(s=>`<button class="filter-btn${activeSetupFilter===s?' active':''}" onclick="setSetupFilter('${s.replace(/'/g,"\\'")}')">${s}</button>`).join('')}`;
}
function setSetupFilter(s){activeSetupFilter=s;renderFilterBar();renderQdTrades();}
function renderQdTrades(){
  const filtered=activeSetupFilter==='All'?currentQTrades:currentQTrades.filter(t=>t.setup===activeSetupFilter);
  const sorted=[...filtered].sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('qd-trades').innerHTML=sorted.length?sorted.map(t=>`
    <div class="qd-trade-card" onclick="openTradeDetailFromQ('${t.date}','${t.id}')">
      <div class="qd-date">${t.date}</div>
      <div class="qd-pair">${t.pair||'—'}</div>
      <div class="qd-setup">${t.setup||'—'}</div>
      <div class="qd-tags">${(t.tags||[]).slice(0,2).map(g=>`<span class="qd-tag">${g}</span>`).join('')}</div>
      <div class="qd-pnl-cell ${pnlClass(t.pnl)}">${pnlStr(t.pnl)}</div>
      <div class="qd-arrow">›</div>
    </div>`).join(''):`<div style="text-align:center;color:#475569;padding:40px;font-size:0.82rem">No trades for this setup</div>`;
}

function openTradeDetailFromQ(dk,tradeId){
  const trades=(data[dk]||{}).trades||[];
  const idx=trades.findIndex(t=>String(t.id)===String(tradeId));
  if(idx>=0)openTradeDetail(dk,idx);
}

function openModal(dk){
  activeDate=dk;editingIdx=null;editingDk=null;
  const d=new Date(dk+'T12:00:00');
  document.getElementById('modal-date-title').textContent=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  renderDaySummary();renderLoggedTrades();
  document.getElementById('trade-form-wrap').style.display='none';
  document.getElementById('add-trade-btn').style.display='block';
  document.getElementById('overlay').classList.add('open');
}
function closeOverlay(e){if(e.target===document.getElementById('overlay'))closeModalDirect();}
function closeModalDirect(){
  document.getElementById('overlay').classList.remove('open');
  document.removeEventListener('paste',handlePaste);
  pendingShots=[];pendingYT='';editingIdx=null;editingDk=null;
}

function renderDaySummary(){
  const trades=(data[activeDate]||{}).trades||[];
  const pnl=trades.reduce((s,t)=>s+(parseFloat(t.pnl)||0),0);
  const wins=trades.filter(t=>t.result==='Win').length;
  const losses=trades.filter(t=>t.result==='Loss').length;
  const wr=trades.length?Math.round(wins/trades.length*100):null;
  document.getElementById('day-summary').innerHTML=`
    <div class="sum-pill"><div class="sum-val purple">${trades.length}</div><div class="sum-lbl">Trades</div></div>
    <div class="sum-pill"><div class="sum-val ${pnlClass(pnl)}">${pnlStr(pnl)}</div><div class="sum-lbl">P&L</div></div>
    <div class="sum-pill"><div class="sum-val neutral">${wr!==null?wr+'%':'—'}</div><div class="sum-lbl">Win Rate</div></div>
    <div class="sum-pill"><div class="sum-val">${wins}W / ${losses}L</div><div class="sum-lbl">Results</div></div>`;
}

function renderLoggedTrades(){
  const trades=(data[activeDate]||{}).trades||[];
  const wrap=document.getElementById('logged-trades');
  if(!trades.length){wrap.innerHTML='';return;}
  wrap.innerHTML=trades.map((t,i)=>`
    <div class="trade-card" onclick="openTradeDetail('${activeDate}',${i})">
      <button class="tc-del" onclick="event.stopPropagation();deleteTrade(${i})">🗑</button>
      <div class="trade-card-header">
        <span class="tc-pair">${t.pair||'—'}</span>
        ${t.result?`<span class="badge-${t.result==='Win'?'win':t.result==='Loss'?'loss':'be'}">${t.result}</span>`:''}
        <span class="tc-pnl ${pnlClass(t.pnl)}">${pnlStr(t.pnl)}</span>
      </div>
      <div class="tc-meta">
        ${t.timeframe?`<span>${t.timeframe}</span>`:''}
        ${t.setup?`<span>${t.setup}</span>`:''}
        ${t.bias?`<span>Bias: ${t.bias}</span>`:''}
      </div>
      ${t.notes?`<div class="tc-notes-preview">${t.notes.length>120?t.notes.slice(0,120)+'…':t.notes}</div>`:''}
      ${t.tags&&t.tags.length?`<div class="tc-tags">${t.tags.map(g=>`<span class="tc-tag">${g}</span>`).join('')}</div>`:''}
      ${t.screenshots&&t.screenshots.length?`<div class="tc-shots">${t.screenshots.map(s=>`<img src="${s}" onclick="event.stopPropagation();openLightbox('${s}')">`).join('')}</div>`:''}
    </div>`).join('');
}

function openTradeDetail(dk,idx){
  const t=((data[dk]||{}).trades||[])[idx];
  if(!t)return;
  editingDk=dk;editingIdx=idx;
  const ytId=getYTId(t.youtube||'');
  document.getElementById('detail-title').textContent=(t.pair||'Trade')+' — '+dk;
  document.getElementById('detail-content').innerHTML=`
    <div class="detail-grid">
      <div class="detail-item"><div class="detail-lbl">Result</div><div class="detail-val ${t.result==='Win'?'green':t.result==='Loss'?'red':'purple'}">${t.result||'—'}</div></div>
      <div class="detail-item"><div class="detail-lbl">P&L</div><div class="detail-val ${pnlClass(t.pnl)}">${pnlStr(t.pnl)}</div></div>
      <div class="detail-item"><div class="detail-lbl">Timeframe</div><div class="detail-val">${t.timeframe||'—'}</div></div>
      <div class="detail-item"><div class="detail-lbl">Bias</div><div class="detail-val">${t.bias||'—'}</div></div>
      <div class="detail-item"><div class="detail-lbl">Setup</div><div class="detail-val">${t.setup||'—'}</div></div>
      <div class="detail-item"><div class="detail-lbl">Followed Plan?</div><div class="detail-val">${t.plan||'—'}</div></div>
    </div>
    ${t.tags&&t.tags.length?`<div class="tc-tags" style="margin-bottom:11px">${t.tags.map(g=>`<span class="tc-tag">${g}</span>`).join('')}</div>`:''}
    ${t.notes?`<div style="background:#0d0d12;border-radius:0 8px 8px 0;border-left:2px solid #a78bfa;padding:11px;font-size:0.8rem;color:#94a3b8;line-height:1.6;margin-bottom:9px"><div style="font-size:0.6rem;color:#475569;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px">Notes</div>${t.notes}</div>`:''}
    ${t.screenshots&&t.screenshots.length?`<div class="ss-grid" style="margin-bottom:9px">${t.screenshots.map(s=>`<div class="ss-thumb"><img src="${s}" onclick="openLightbox('${s}')" style="cursor:pointer"></div>`).join('')}</div>`:''}
    ${ytId?`<div style="margin-top:8px"><div style="font-size:0.6rem;color:#475569;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px">Video</div>${ytThumb(ytId,t.youtube)}</div>`:''}`;
  document.getElementById('detail-edit-btn').onclick=()=>startEdit(dk,idx);
  document.getElementById('detail-overlay').classList.add('open');
}
function closeDetailOverlay(e){if(e.target===document.getElementById('detail-overlay'))closeDetailDirect();}
function closeDetailDirect(){document.getElementById('detail-overlay').classList.remove('open');}

function startEdit(dk,idx){
  const t=((data[dk]||{}).trades||[])[idx];
  if(!t)return;
  activeDate=dk;editingIdx=idx;editingDk=dk;
  pendingShots=[...(t.screenshots||[])];
  pendingYT=t.youtube||'';
  activeTags=new Set(t.tags||[]);
  closeDetailDirect();
  const d=new Date(dk+'T12:00:00');
  document.getElementById('modal-date-title').textContent=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  renderDaySummary();renderLoggedTrades();
  document.getElementById('add-trade-btn').style.display='none';
  document.getElementById('overlay').classList.add('open');
  showTradeForm(t);
}

function pairDropdownHTML(selected){
  const sorted=[...new Set(customPairs)].sort();
  return`<select id="tf-pair-select" onchange="syncPairInput()" style="background:#13131a;border:1px solid #2d2d3d;border-radius:6px;color:#e2e8f0;padding:6px 8px;font-size:0.8rem;outline:none;width:100%;margin-bottom:4px">
    <option value="">— Select pair —</option>
    ${sorted.map(p=>`<option ${selected===p?'selected':''}>${p}</option>`).join('')}
  </select>
  <input id="tf-pair" placeholder="Or type custom pair..." value="${selected||''}" style="background:#13131a;border:1px solid #2d2d3d;border-radius:6px;color:#e2e8f0;padding:6px 8px;font-size:0.8rem;outline:none;width:100%;text-transform:uppercase" oninput="this.value=this.value.toUpperCase()">
  <div class="pair-manager" id="pair-manager">
    ${sorted.map(p=>`<div class="pair-item"><span onclick="selectPair('${p}')">${p}</span><button class="pair-del" onclick="deletePair('${p}')">✕</button></div>`).join('')}
    <div class="pair-add-row">
      <input id="pair-new-input" placeholder="Add new pair..." oninput="this.value=this.value.toUpperCase()">
      <button onclick="addPair()">Add</button>
    </div>
  </div>
  <div style="font-size:0.65rem;color:#475569;margin-top:4px;cursor:pointer;user-select:none" onclick="togglePairManager()">⚙ Manage pairs list</div>`;
}

function syncPairInput(){
  const sel=document.getElementById('tf-pair-select');
  const inp=document.getElementById('tf-pair');
  if(sel&&inp&&sel.value)inp.value=sel.value;
}
function selectPair(p){
  const inp=document.getElementById('tf-pair');if(inp)inp.value=p;
  const sel=document.getElementById('tf-pair-select');if(sel)sel.value=p;
  const pm=document.getElementById('pair-manager');if(pm)pm.classList.remove('open');
}
function togglePairManager(){
  const pm=document.getElementById('pair-manager');if(pm)pm.classList.toggle('open');
}
function addPair(){
  const inp=document.getElementById('pair-new-input');if(!inp)return;
  const val=inp.value.trim().toUpperCase();if(!val)return;
  if(!customPairs.includes(val))customPairs.push(val);
  savePairs();
  const cur=document.getElementById('tf-pair');
  const curVal=cur?cur.value:'';
  const pairWrap=document.getElementById('pair-wrap');
  if(pairWrap){pairWrap.innerHTML=pairDropdownHTML(curVal);document.getElementById('pair-manager').classList.add('open');}
}
function deletePair(p){
  customPairs=customPairs.filter(x=>x!==p);savePairs();
  const cur=document.getElementById('tf-pair');
  const curVal=cur?cur.value:'';
  const pairWrap=document.getElementById('pair-wrap');
  if(pairWrap){pairWrap.innerHTML=pairDropdownHTML(curVal);document.getElementById('pair-manager').classList.add('open');}
}

function showTradeForm(existing){
  if(!existing){pendingShots=[];pendingYT='';activeTags=new Set();editingIdx=null;editingDk=null;}
  document.getElementById('add-trade-btn').style.display='none';
  const w=document.getElementById('trade-form-wrap');
  w.style.display='block';
  const e=existing||{};
  w.innerHTML=`<div class="trade-form">
    <div style="font-size:0.75rem;color:#a78bfa;margin-bottom:10px;font-weight:600">${existing?'✏️ Editing Trade':'New Trade'}</div>
    <div style="font-size:0.68rem;color:#475569;margin-bottom:10px">Result sets automatically — positive P&L = Win, negative = Loss</div>
    <div class="form-row">
      <div class="fg" style="grid-column:span 2">
        <label>Pair</label>
        <div id="pair-wrap">${pairDropdownHTML(e.pair||'')}</div>
      </div>
      <div class="fg"><label>Timeframe</label><select id="tf-tf">
        <option value="">—</option>
        ${['1m','5m','15m','30m','1H','4H','Daily'].map(v=>`<option ${e.timeframe===v?'selected':''}>${v}</option>`).join('')}
      </select></div>
      <div class="fg"><label>P&L ($)</label><input id="tf-pnl" type="number" step="0.01" value="${e.pnl||''}" placeholder="+80 or -22"></div>
      <div class="fg"><label>Bias</label><select id="tf-bias">
        <option value="">—</option>
        ${['Bullish','Bearish','Neutral'].map(v=>`<option ${e.bias===v?'selected':''}>${v}</option>`).join('')}
      </select></div>
      <div class="fg"><label>Setup</label><select id="tf-setup">
        <option value="">—</option>
        ${SETUPS.map(v=>`<option ${e.setup===v?'selected':''}>${v}</option>`).join('')}
      </select></div>
      <div class="fg"><label>Plan?</label><select id="tf-plan">
        <option value="">—</option>
        ${['Yes','No'].map(v=>`<option ${e.plan===v?'selected':''}>${v}</option>`).join('')}
      </select></div>
    </div>
    <div class="tags-wrap">
      <div class="tags-lbl">Tags — tap to toggle</div>
      <div class="tags-list" id="tags-list"></div>
    </div>
    <div class="fg" style="margin:9px 0"><label>Notes</label><textarea id="tf-notes" placeholder="Entry/exit reasoning, what you'd change...">${e.notes||''}</textarea></div>
    <div class="tags-lbl">Screenshots</div>
    <div class="ss-area"><input type="file" accept="image/*" multiple onchange="handleFile(event)">📎 Click to upload or paste (Ctrl+V)</div>
    <div class="ss-grid" id="ss-preview"></div>
    <div class="yt-wrap">
      <div class="tags-lbl" style="margin-bottom:6px">YouTube Video</div>
      <div class="yt-input-row">
        <input id="yt-input" placeholder="Paste any YouTube link..." value="${e.youtube||''}">
        <button onclick="previewYT()">Preview</button>
      </div>
      <div id="yt-preview-wrap"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:11px">
      <button class="cancel-btn" onclick="cancelForm()">Cancel</button>
      <button class="save-btn" onclick="saveTrade()">${existing?'Update Trade':'Save Trade'}</button>
    </div>
  </div>`;
  renderTagButtons();renderSS();
  if(e.youtube){const ytId=getYTId(e.youtube);if(ytId)showYTPreview(ytId,e.youtube);}
  document.addEventListener('paste',handlePaste);
}

function previewYT(){
  const url=document.getElementById('yt-input').value.trim();
  const ytId=getYTId(url);
  if(!ytId){alert('Could not find a video ID. Copy the link from your browser address bar.');return;}
  pendingYT=url;showYTPreview(ytId,url);
}
function showYTPreview(ytId,url){
  const wrap=document.getElementById('yt-preview-wrap');if(!wrap)return;
  wrap.innerHTML=ytThumb(ytId,url||'https://www.youtube.com/watch?v='+ytId)+
    `<br><span class="yt-remove" onclick="removeYT()">✕ Remove video</span>`;
}
function removeYT(){
  pendingYT='';
  const wrap=document.getElementById('yt-preview-wrap');if(wrap)wrap.innerHTML='';
  const inp=document.getElementById('yt-input');if(inp)inp.value='';
}
function renderTagButtons(){
  const list=document.getElementById('tags-list');if(!list)return;
  list.innerHTML=TAGS.map(g=>`<button class="tag-btn${activeTags.has(g)?' active':''}" onclick="toggleTag(this,'${g.replace(/'/g,"\\'")}')">${g}</button>`).join('');
}
function toggleTag(btn,tag){
  if(activeTags.has(tag)){activeTags.delete(tag);btn.classList.remove('active');}
  else{activeTags.add(tag);btn.classList.add('active');}
}
function cancelForm(){
  document.getElementById('trade-form-wrap').style.display='none';
  document.getElementById('add-trade-btn').style.display='block';
  document.removeEventListener('paste',handlePaste);
  pendingShots=[];pendingYT='';editingIdx=null;editingDk=null;
}
function handlePaste(e){
  const items=(e.clipboardData||e.originalEvent.clipboardData).items;
  for(const item of items){if(item.type.startsWith('image')){const r=new FileReader();r.onload=ev=>addShot(ev.target.result);r.readAsDataURL(item.getAsFile());}}
}
function handleFile(e){for(const f of e.target.files){const r=new FileReader();r.onload=ev=>addShot(ev.target.result);r.readAsDataURL(f);}}
function addShot(url){pendingShots.push(url);renderSS();}
function removeShot(i){pendingShots.splice(i,1);renderSS();}
function renderSS(){
  const el=document.getElementById('ss-preview');if(!el)return;
  el.innerHTML=pendingShots.map((s,i)=>`<div class="ss-thumb"><img src="${s}"><button class="ss-del" onclick="removeShot(${i})">x</button></div>`).join('');
}

function saveTrade(){
  const pairInp=document.getElementById('tf-pair');
  const pair=pairInp?pairInp.value.trim().toUpperCase():'';
  if(!pair){alert('Enter a pair.');return;}
  const pnl=parseFloat(document.getElementById('tf-pnl').value)||0;
  const ytInp=document.getElementById('yt-input');
  const t={
    id:(editingIdx!==null&&data[activeDate]?data[activeDate].trades[editingIdx].id:null)||Date.now(),
    pair,
    timeframe:document.getElementById('tf-tf').value,
    pnl,result:autoResult(pnl),
    bias:document.getElementById('tf-bias').value,
    setup:document.getElementById('tf-setup').value,
    plan:document.getElementById('tf-plan').value,
    notes:document.getElementById('tf-notes').value,
    tags:[...activeTags],
    screenshots:[...pendingShots],
    youtube:ytInp?ytInp.value.trim():pendingYT||''
  };
  if(!data[activeDate])data[activeDate]={trades:[]};
  if(editingIdx!==null){data[activeDate].trades[editingIdx]=t;}
  else{data[activeDate].trades.push(t);}
  saveData();cancelForm();
  renderDaySummary();renderLoggedTrades();renderCalendar();
  renderQuarterlyOverview();updateStats();
}

function deleteTrade(idx){
  if(!confirm('Delete this trade?'))return;
  data[activeDate].trades.splice(idx,1);
  if(!data[activeDate].trades.length)delete data[activeDate];
  saveData();renderDaySummary();renderLoggedTrades();renderCalendar();
  renderQuarterlyOverview();updateStats();
}

function openLightbox(src){document.getElementById('lb-img').src=src;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}

function updateStats(){
  const all=Object.values(data).flatMap(d=>d.trades||[]);
  const pnl=all.reduce((s,t)=>s+(parseFloat(t.pnl)||0),0);
  const wins=all.filter(t=>t.result==='Win').length;
  const wr=all.length?Math.round(wins/all.length*100):null;
  document.getElementById('hs-trades').textContent=all.length;
  document.getElementById('hs-wr').textContent=wr!==null?wr+'%':'—';
  document.getElementById('hs-wr').style.color='#94a3b8';
  document.getElementById('hs-pnl').textContent=pnlStr(pnl);
  document.getElementById('hs-pnl').style.color=pnl>0?'#4ade80':pnl<0?'#f87171':'#64748b';
}

init();
</script>
<script>
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-password').value;
  const btn=document.getElementById('login-btn');
  const err=document.getElementById('login-error');
  err.textContent='';
  if(!email||!password){err.textContent='Enter email and password';return}
  btn.disabled=true;btn.textContent='Signing in...';
  const {data,error}=await supabaseClient.auth.signInWithPassword({email,password});
  btn.disabled=false;btn.textContent='Sign In';
  if(error){err.textContent=error.message;return}
  currentUser=data.user;
  showApp();
}
function showApp(){
  document.body.classList.add('auth-ready');
}
function showLogin(){
  document.getElementById('app-loading').style.display='none';
  document.getElementById('login-overlay').style.display='flex';
}
async function checkAuth(){
  const {data}=await supabaseClient.auth.getSession();
  if(data.session){
    currentUser=data.session.user;
    showApp();
  } else {
    showLogin();
  }
}
checkAuth();
</script>
